stages:
  - validate
  - publish

variables:
  TF_IN_AUTOMATION: "true"

validate:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  script:
    - |
      set -eu

      for module in modules/*; do
        [ -d "$module" ] || continue

        case "$module" in
          modules/n8n-deployment)
            echo "Skipping ${module}: composite module with remote child modules"
            continue
            ;;
        esac

        echo "Validating ${module}"
        tofu -chdir="$module" init -backend=false
        tofu -chdir="$module" validate
      done

publish-modules:
  stage: publish
  image: alpine:latest
  needs:
    - validate
  before_script:
    - apk add --no-cache curl tar
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      set -eu

      VERSION="${CI_COMMIT_TAG#v}"

      publish_module() {
        module_dir="$1"
        module_name="$2"
        module_system="$3"
        archive="/tmp/${module_name}-${module_system}-${VERSION}.tgz"

        echo "Publishing ${module_name}/${module_system}/${VERSION} from ${module_dir}"
        tar \
          --exclude=.terraform \
          --exclude=.terraform.lock.hcl \
          --exclude=terraform.tfstate \
          --exclude=terraform.tfstate.backup \
          -czf "$archive" \
          -C "$module_dir" \
          .

        curl --fail-with-body --location \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$archive" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${module_name}/${module_system}/${VERSION}/file"
      }

      publish_module modules/cloud-front cloud-front aws
      publish_module modules/cloud-front-iam cloud-front-iam aws
      publish_module modules/cloud-front-to-public-ec2 cloud-front-to-public-ec2 aws
      publish_module modules/deploy_compose deploy-compose aws
      publish_module modules/ec2-docker ec2-docker aws
      publish_module modules/fluentbit-k8s fluentbit-k8s helm
      publish_module modules/loki-aws-eks loki-aws-eks aws
      publish_module modules/smtp_email_account smtp-email-account aws
      publish_module modules/subnet-by-name subnet-by-name aws
